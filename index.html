<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<!-- 📱 MOBILE FULL SCREEN -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Carte Mayotte Mobile PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>

/* 🌍 GLOBAL FULL SCREEN */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  overflow: hidden;
  font-family: Arial;
}

#app {
  height: 100vh;
  width: 100vw;
  position: relative;
}

/* 🗺 MAP FULL SCREEN */
#map {
  height: 100%;
  width: 100%;
}

/* 📊 STATS */
#statsBtn {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 9999;
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 13px;
}

/* ⭐ VIP */
#vipRanking {
  position: fixed;
  top: 50px;
  left: 10px;
  z-index: 9999;
  background: rgba(0,0,0,0.6);
  color: gold;
  padding: 8px;
  border-radius: 10px;
  font-size: 11px;
  max-width: 180px;
}

/* 🔎 SEARCH */
#search {
  position: fixed;
  top: 120px;
  left: 10px;
  z-index: 9999;
  width: 180px;
  padding: 6px;
  border-radius: 8px;
  border: none;
}

/* 📋 FORM */
.form {
  position: fixed;
  bottom: 60px;
  left: 10px;
  right: 10px;
  z-index: 9999;
  background: rgba(0,0,0,0.85);
  padding: 10px;
  border-radius: 12px;
  display: none;
  flex-direction: column;
  gap: 6px;
}

.form input, .form button {
  padding: 8px;
  border-radius: 8px;
  border: none;
}

/* 🔘 FILTERS */
#filters {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  display: flex;
  gap: 5px;
}

#filters button {
  font-size: 12px;
  padding: 6px 8px;
  border-radius: 8px;
}

/* 🟢 BASIC */
.pulse.basic{
  width:14px;
  height:14px;
  border-radius:50%;
  background:#00ff88;
  box-shadow:0 0 10px #00ff88;
}

/* 🟡 VIP GLOW */
.pulse.vip{
  width:16px;
  height:16px;
  border-radius:50%;
  background:gold;
  box-shadow:0 0 15px gold,0 0 30px orange;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow{
  from{transform:scale(1);opacity:0.7;}
  to{transform:scale(1.3);opacity:1;}
}

</style>
</head>

<body>

<div id="app">

<div id="statsBtn">📊 Clients: 0</div>
<div id="vipRanking"></div>

<input id="search" placeholder="🔎 Recherche..." oninput="searchClients()" />

<div class="form">
  <input id="nom" placeholder="Nom"/>
  <input id="prenom" placeholder="Prénom"/>
  <input id="ville" placeholder="Ville"/>
  <input id="numero" placeholder="Numéro"/>
  <input id="adresse" placeholder="Adresse"/>

  <button onclick="setType('basic')">BASIC</button>
  <button onclick="setType('vip')">VIP ⭐</button>

  <button onclick="addClient()">Ajouter client</button>
  <button onclick="toggleForm()">Fermer</button>
</div>

<div id="map"></div>

<div id="filters">
  <button onclick="setFilter('all')">Tout</button>
  <button onclick="setFilter('done')">OK</button>
  <button onclick="setFilter('todo')">En cours</button>
  <button onclick="exportCSV()">Export</button>
</div>

</div>

<script>

const map = L.map('map').setView([-12.8275,45.1662],10);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let clients = JSON.parse(localStorage.getItem("clients")) || [];
let markers = {};
let filter="all";
let searchQuery="";
let clientType="basic";

/* TYPE */
function setType(t){ clientType=t; }

/* FORM */
function toggleForm(){
  const f=document.querySelector(".form");
  f.style.display = f.style.display==="flex"?"none":"flex";
}

/* SAVE */
function save(){
  localStorage.setItem("clients",JSON.stringify(clients));
  updateStats();
  updateVIPRanking();
}

/* STATS */
function updateStats(){
  const total=clients.length;
  const done=clients.filter(c=>c.completed).length;

  document.getElementById("statsBtn").innerHTML=
  `📊 Total:${total} | ✅:${done} | ⏳:${total-done}`;
}

/* VIP */
function updateVIPRanking(){
  const vip=clients.filter(c=>c.type==="vip");
  vip.sort((a,b)=>a.completed-b.completed);

  let html="⭐ VIP:<br>";
  vip.slice(0,5).forEach((c,i)=>{
    html+=`${i+1}. ${c.nom} ${c.completed?"✅":"⏳"}<br>`;
  });

  document.getElementById("vipRanking").innerHTML=html;
}

/* ICON */
function icon(type){
  return L.divIcon({
    html:`<div class="pulse ${type}"></div>`
  });
}

/* RENDER */
function render(){
  Object.values(markers).forEach(m=>map.removeLayer(m));
  markers={};

  clients.forEach(c=>{
    const m=L.marker(c.coords,{icon:icon(c.type)}).addTo(map);

    m.bindPopup(`
      <b>${c.nom} ${c.prenom}</b><br>
      ⭐ ${c.type}<br>
      📍 ${c.ville}
    `);

    markers[c.id]=m;
  });

  updateStats();
  updateVIPRanking();
}

/* ADD */
function addClient(){
  const c={
    id:Date.now().toString(),
    nom:nom.value,
    prenom:prenom.value,
    ville:ville.value,
    numero:numero.value,
    adresse:adresse.value,
    type:clientType,
    completed:false,
    coords:[-12.8275,45.1662]
  };

  clients.push(c);
  save();
  render();

  document.querySelectorAll("input").forEach(i=>i.value="");
}

/* SEARCH */
function searchClients(){
  searchQuery=document.getElementById("search").value.toLowerCase();
  render();
}

/* EXPORT */
function exportCSV(){
  let csv="Nom,Prénom,Ville,Numéro,Type\n";
  clients.forEach(c=>{
    csv+=`${c.nom},${c.prenom},${c.ville},${c.numero},${c.type}\n`;
  });

  const blob=new Blob([csv],{type:"text/csv"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="clients.csv";
  a.click();
}

render();

</script>

</body>
</html>
