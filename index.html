<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte Mayotte Mobile</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css">

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<style>
body{margin:0;font-family:Arial;background:#041f17;color:white;overflow:hidden;}
#map{height:100vh;width:100%;}

.panel{
position:absolute;
top:10px;
left:10px;
right:10px;
z-index:9999;
display:flex;
flex-wrap:wrap;
gap:8px;
}

.panel input{
padding:10px;
border:none;
border-radius:8px;
background:#0b2b22;
color:white;
flex:1;
min-width:120px;
}

.panel button{
padding:10px;
border:none;
border-radius:8px;
background:#1db954;
color:white;
cursor:pointer;
}

.pulse{
width:14px;
height:14px;
border-radius:50%;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
70%{transform:scale(1.3);}
100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="panel">
<input id="nom" placeholder="Nom">
<input id="prenom" placeholder="Prénom">
<input id="ville" placeholder="Village (ex: Acoua)">
<input id="numero" placeholder="Numéro">
<input id="prix" placeholder="Prix">
<button onclick="addClient()">Ajouter</button>
</div>

<div id="map"></div>

<script>

/* ================= MAP ================= */
const map = L.map('map').setView([-12.8275,45.1662],10);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png')
.addTo(map);

/* ================= BASE VILLAGES ================= */
const villagesBase = {
"acoua":[-12.7236,45.0419],
"mamoudzou":[-12.7806,45.2278],
"dembeni":[-12.8456,45.1942],
"koungou":[-12.7356,45.2041],
"chiconi":[-12.8322,45.1064],
"sada":[-12.8533,45.1021]
};

/* ================= DATA ================= */
let clients = JSON.parse(localStorage.getItem("clients")) || [];

let clusterGroup = L.markerClusterGroup({
spiderfyOnMaxZoom:true
});
map.addLayer(clusterGroup);

/* ================= GEO ================= */
async function getCoords(ville){

if(!ville) return [-12.8275,45.1662];

let key = ville.toLowerCase();

if(villagesBase[key]){
return villagesBase[key];
}

try{
const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(ville + ", Mayotte")}`);
const data = await res.json();

if(data[0]){
return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
}

}catch(e){}

return [-12.8275,45.1662];
}

/* ================= ADD ================= */
async function addClient(){

const coords = await getCoords(ville.value);

const c={
id:Date.now().toString(),
nom:nom.value,
prenom:prenom.value,
ville:ville.value,
numero:numero.value,
prix:prix.value,
coords:coords,
completed:false
};

clients.push(c);
localStorage.setItem("clients",JSON.stringify(clients));

render();

map.flyTo(coords,14);

nom.value=prenom.value=ville.value=numero.value=prix.value="";
}

/* ================= DELETE ================= */
function deleteClient(id){
clients=clients.filter(c=>c.id!==id);
localStorage.setItem("clients",JSON.stringify(clients));
render();
}

/* ================= COMPLETE ================= */
function completeClient(id){
clients=clients.map(c=>{
if(c.id===id) c.completed=true;
return c;
});
localStorage.setItem("clients",JSON.stringify(clients));
render();
}

/* ================= RENDER ================= */
function render(){

clusterGroup.clearLayers();

clients.forEach(c=>{

const color=c.completed?"#777":"#00ff88";

const marker=L.marker(c.coords,{
icon:L.divIcon({
className:"",
html:`<div class="pulse" style="background:${color}"></div>`
})
});

marker.bindPopup(`
<b>${c.nom} ${c.prenom}</b><br>
📍 ${c.ville}<br>
📞 ${c.numero}<br>
💰 ${c.prix}<br><br>

${!c.completed ?
`<button onclick="completeClient('${c.id}')">✔ Valider</button>`:"✔ OK<br><br>"}

<button onclick="deleteClient('${c.id}')">🗑 Supprimer</button>
`);

clusterGroup.addLayer(marker);

});

}

render();

</script>

</body>
</html>
