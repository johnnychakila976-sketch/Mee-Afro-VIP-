<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Carte Mayotte Mobile</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#041f17;
  color:white;
  overflow:hidden;
}

#app{display:flex;height:100vh;flex-direction:column;}

.header{
  padding:10px;
  background:rgba(0,0,0,0.4);
  text-align:center;
  font-weight:bold;
}

#statsBtn{
  position:absolute;
  top:10px;
  right:10px;
  background:#1db954;
  padding:8px 12px;
  border-radius:8px;
  font-weight:bold;
  z-index:999;
}

#filters{
  position:absolute;
  top:10px;
  left:10px;
  display:flex;
  gap:5px;
  z-index:999;
  flex-wrap:wrap;
}

#filters button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  background:#0b2b22;
  color:white;
}

#filters button.active{
  background:#1db954;
}

#searchInput{
  width:180px;
  padding:6px 10px;
  border:none;
  border-radius:6px;
  background:#0b2b22;
  color:white;
}

.toggle-btn{
  margin:8px;
  padding:10px;
  background:#1db954;
  border:none;
  color:white;
  font-weight:bold;
  border-radius:8px;
}

.form{
  padding:10px;
  background:rgba(0,0,0,0.3);
  display:none;
  flex-wrap:wrap;
  gap:5px;
}

.form input{
  flex:1;
  min-width:45%;
  padding:8px;
  background:#0b2b22;
  border:none;
  color:white;
  border-radius:6px;
}

.form button{
  width:100%;
  padding:10px;
  background:#1db954;
  border:none;
  color:white;
  font-weight:bold;
  border-radius:8px;
}

.vip-box{
  display:flex;
  gap:5px;
  width:100%;
}

.vip-box button{
  flex:1;
}

.vip-active{
  background:#ffd700 !important;
  color:black !important;
}

#map{flex:1;}

.pulse{
  width:14px;height:14px;
  border-radius:50%;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  70%{transform:scale(1.3);}
  100%{transform:scale(1);}
}

#modal{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#0b2b22;
  padding:15px;
  display:none;
  z-index:9999;
  border-top-left-radius:15px;
  border-top-right-radius:15px;
}
</style>
</head>

<body>

<div id="app">

<div id="statsBtn">📊 Clients: 0</div>

<div id="filters">
  <input id="searchInput" placeholder="🔎 Rechercher un client..." onkeyup="render()">
  <button onclick="setFilter('all')" class="active">Tout</button>
  <button onclick="setFilter('done')">Complétés</button>
  <button onclick="setFilter('todo')">Non</button>
  <button onclick="exportCSV()">📤 Export</button>
</div>

<div class="header">📍 Carte Mayotte Mobile PRO</div>

<button class="toggle-btn" onclick="toggleForm()">📋 Formulaire</button>

<div class="form" id="form">
  <input id="nom" placeholder="Nom"/>
  <input id="prenom" placeholder="Prénom"/>
  <input id="ville" placeholder="Ville"/>
  <input id="numero" placeholder="Numéro"/>
  <input id="adresse" placeholder="Adresse"/>
  <input id="quartier" placeholder="Quartier"/>

  <div class="vip-box">
    <button type="button" id="basicBtn" onclick="setType('BASIC')" class="vip-active">BASIC</button>
    <button type="button" id="vipBtn" onclick="setType('VIP')">VIP ⭐</button>
  </div>

  <button onclick="addClient()">Ajouter client</button>
</div>

<div id="map"></div>
</div>

<div id="modal">
  <div id="modalContent"></div>
  <button onclick="closeModal()">Fermer</button>
  <button onclick="deleteClient()" style="background:red;color:white;margin-top:10px;">
    🗑 Supprimer
  </button>
</div>

<script>

const map = L.map('map').setView([-12.8275,45.1662],10);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let clients = JSON.parse(localStorage.getItem("clients")) || [];
let markers = {};
let filter="all";
let selectedClientId=null;
let clientType="BASIC";

function updateStats(){
  document.getElementById("statsBtn").innerText="📊 Clients: "+clients.length;
}

function save(){
  localStorage.setItem("clients",JSON.stringify(clients));
  updateStats();
}

function toggleForm(){
  const f=document.getElementById("form");
  f.style.display=f.style.display==="flex"?"none":"flex";
}

function setType(type){
  clientType=type;

  basicBtn.classList.remove("vip-active");
  vipBtn.classList.remove("vip-active");

  if(type==="BASIC") basicBtn.classList.add("vip-active");
  if(type==="VIP") vipBtn.classList.add("vip-active");
}

function createIcon(color){
  return L.divIcon({
    className:"",
    html:`<div class="pulse" style="background:${color}"></div>`,
    iconSize:[20,20]
  });
}

function setFilter(f){
  filter=f;
  document.querySelectorAll("#filters button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
  render();
}

function render(){
  Object.values(markers).forEach(m=>map.removeLayer(m));
  markers={};

  const search = document.getElementById("searchInput").value.toLowerCase();

  clients.forEach(c=>{

    if(filter==="done" && !c.completed) return;
    if(filter==="todo" && c.completed) return;

    const txt=(c.nom+" "+c.prenom+" "+c.ville).toLowerCase();
    if(!txt.includes(search)) return;

    const color = c.completed ? "#777" : (c.type==="VIP" ? "#ffd700" : "#00ff88");

    const m=L.marker(c.coords,{
      icon:createIcon(color)
    }).addTo(map);

    m.on("click",()=>openModal(c));

    markers[c.id]=m;
  });

  updateStats();
}

function openModal(c){
  selectedClientId=c.id;

  document.getElementById("modalContent").innerHTML=`
    <b>${c.nom} ${c.prenom}</b><br>
    📍 ${c.ville}<br>
    🏘 ${c.quartier || "-"}<br>
    🏠 ${c.adresse}<br>
    📞 ${c.numero}<br>
    ⭐ ${c.type}<br>
    Status: ${c.completed ? "✅ Terminé" : "⏳ En cours"}
  `;

  document.getElementById("modal").style.display="block";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function deleteClient(){
  clients = clients.filter(c=>c.id!==selectedClientId);
  save();
  render();
  closeModal();
}

function exportCSV(){
  let csv="Nom,Prénom,Ville,Numéro,Adresse,Quartier,Type,Status\n";

  clients.forEach(c=>{
    csv+=`${c.nom},${c.prenom},${c.ville},${c.numero},${c.adresse},${c.quartier},${c.type},${c.completed?"OK":"NON"}\n`;
  });

  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);

  const a=document.createElement("a");
  a.href=url;
  a.download="clients.csv";
  a.click();
}

async function getCoords(ville){
  const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${ville}, Mayotte`);
  const d=await res.json();

  if(d[0]) return [parseFloat(d[0].lat),parseFloat(d[0].lon)];

  return [-12.8275,45.1662];
}

async function addClient(){

  const c={
    id:Date.now().toString(),
    nom:nom.value,
    prenom:prenom.value,
    ville:ville.value,
    numero:numero.value,
    adresse:adresse.value,
    quartier:quartier.value,
    type:clientType,
    completed:false,
    coords:await getCoords(ville.value)
  };

  clients.push(c);

  save();
  render();

  map.flyTo(c.coords,13);

  document.querySelectorAll("input").forEach(i=>{
    if(i.id!=="searchInput") i.value="";
  });
}

render();

</script>
</body>
</html>
