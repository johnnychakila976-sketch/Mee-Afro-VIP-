<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Carte Mayotte Mobile PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- ZIP LIB -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
#map{height:400px;margin-top:10px;}
.pulse.basic{
  width:14px;height:14px;border-radius:50%;
  background:#00ff88;
  box-shadow:0 0 10px #00ff88;
}
.pulse.vip{
  width:16px;height:16px;border-radius:50%;
  background:gold;
  box-shadow:0 0 15px gold,0 0 30px orange;
  animation:glow 1.5s infinite alternate;
}
@keyframes glow{
  from{transform:scale(1);opacity:0.7;}
  to{transform:scale(1.3);opacity:1;}
}
</style>
</head>

<body>

<div id="app">

<div id="statsBtn">📊 Clients: 0</div>

<div id="vipRanking"></div>

<input id="search" placeholder="🔎 Rechercher..." oninput="searchClients()" />

<div id="filters">
  <button onclick="setFilter('all')" class="active">Tout</button>
  <button onclick="setFilter('done')">Complétés</button>
  <button onclick="setFilter('todo')">Non</button>
  <button onclick="exportCSV()">📤 Export CSV</button>
  <button onclick="exportToPhone()">📱 Export téléphone</button>
</div>

<div class="header">📍 Carte Mayotte Mobile PRO</div>

<div class="form">
  <input id="nom" placeholder="Nom"/>
  <input id="prenom" placeholder="Prénom"/>
  <input id="ville" placeholder="Ville"/>
  <input id="numero" placeholder="Numéro"/>
  <input id="adresse" placeholder="Adresse"/>

  <button onclick="setType('basic')">BASIC</button>
  <button onclick="setType('vip')">VIP ⭐</button>

  <button onclick="addClient()">Ajouter client</button>
</div>

<div id="map"></div>
</div>

<script>

const map = L.map('map').setView([-12.8275,45.1662],10);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let clients = JSON.parse(localStorage.getItem("clients")) || [];
let markers = {};
let filter="all";
let searchQuery="";
let clientType="basic";

/* TYPE */
function setType(t){ clientType=t; }

/* SAVE */
function save(){
  localStorage.setItem("clients",JSON.stringify(clients));
  updateStats();
  updateVIPRanking();
}

/* STATS */
function updateStats(){
  const total=clients.length;
  const done=clients.filter(c=>c.completed).length;
  document.getElementById("statsBtn").innerHTML=
  `📊 Total:${total} | ✅:${done} | ⏳:${total-done}`;
}

/* VIP RANKING */
function updateVIPRanking(){
  const vip=clients.filter(c=>c.type==="vip");
  vip.sort((a,b)=>a.completed-b.completed);

  let html="⭐ VIP Ranking:<br>";
  vip.slice(0,5).forEach((c,i)=>{
    html+=`${i+1}. ${c.nom} ${c.prenom} ${c.completed?"✅":"⏳"}<br>`;
  });

  document.getElementById("vipRanking").innerHTML=html;
}

/* ICON */
function icon(type){
  return L.divIcon({
    html:`<div class="pulse ${type}"></div>`
  });
}

/* RENDER */
function render(){
  Object.values(markers).forEach(m=>map.removeLayer(m));
  markers={};

  clients.forEach(c=>{
    const m=L.marker(c.coords,{icon:icon(c.type)}).addTo(map);

    m.bindPopup(`
      <b>${c.nom} ${c.prenom}</b><br>
      ⭐ ${c.type}<br>
      📍 ${c.ville}<br>
      📞 ${c.numero}
    `);

    markers[c.id]=m;
  });

  updateStats();
  updateVIPRanking();
}

/* ADD */
function addClient(){
  const c={
    id:Date.now().toString(),
    nom:nom.value,
    prenom:prenom.value,
    ville:ville.value,
    numero:numero.value,
    adresse:adresse.value,
    type:clientType,
    completed:false,
    coords:[-12.8275,45.1662]
  };

  clients.push(c);
  save();
  render();
}

/* EXPORT CSV */
function exportCSV(){
  let csv="Nom,Prénom,Ville,Numéro,Type\n";
  clients.forEach(c=>{
    csv+=`${c.nom},${c.prenom},${c.ville},${c.numero},${c.type}\n`;
  });

  const blob=new Blob([csv],{type:"text/csv"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="clients.csv";
  a.click();
}

/* 📱 EXPORT TÉLÉPHONE (DOSSIER ZIP) */
function exportToPhone(){
  const zip = new JSZip();
  const folder = zip.folder("stakage client carte");

  folder.file("clients.json", JSON.stringify(clients,null,2));

  folder.file("storage.json", JSON.stringify({
    total:clients.length,
    exportDate:new Date(),
    clients:clients
  },null,2));

  zip.generateAsync({type:"blob"}).then(content=>{
    const a=document.createElement("a");
    a.href=URL.createObjectURL(content);
    a.download="stakage client carte.zip";
    a.click();
  });
}

render();

</script>

</body>
</html>
