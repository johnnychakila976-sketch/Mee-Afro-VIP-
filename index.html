<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte Mayotte Mobile</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css">

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Arial;background:#041f17;color:white;overflow:hidden;}
#app{display:flex;height:100vh;flex-direction:column;}
.header{padding:12px;background:rgba(0,0,0,.45);text-align:center;font-weight:bold;}
#statsBtn{position:absolute;bottom:64px;left:12px;background:#1db954;padding:8px 12px;border-radius:10px;font-weight:bold;z-index:999;}
#map{flex:1;}
.pulse{width:14px;height:14px;border-radius:50%;animation:pulse 1.5s infinite;}
@keyframes pulse{0%{transform:scale(1);}70%{transform:scale(1.25);}100%{transform:scale(1);}}
</style>
</head>

<body>

<div id="app">
<div id="statsBtn">📊 Clients</div>
<div class="header">📍 Carte Mayotte</div>
<div id="map"></div>
</div>

<script>

const map = L.map('map').setView([-12.8275,45.1662],10);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

/* =========================
   DATA
========================= */
let clients = JSON.parse(localStorage.getItem("clients")) || [];
let clusterGroup = L.markerClusterGroup();
map.addLayer(clusterGroup);

/* =========================
   RENDER
========================= */
function render(){

clusterGroup.clearLayers();

clients.forEach(c=>{

const color = c.completed ? "#777" : (c.type==="VIP" ? "#ffd700" : "#00ff88");

const marker = L.marker(c.coords,{
icon:L.divIcon({
className:"",
html:`<div class="pulse" style="background:${color}"></div>`,
iconSize:[14,14]
})
});

/* =========================
   POPUP FIX COMPLET
========================= */
marker.bindPopup(`
<div style="min-width:180px">
<b>${c.nom} ${c.prenom}</b><br>
📍 ${c.ville}<br>
🏘 ${c.quartier||"-"}<br>
📞 ${c.numero||"-"}<br>
💰 ${c.prix||"0"}<br>
⭐ ${c.type}<br><br>

${!c.completed ? `
<button onclick="completeClient('${c.id}')" 
style="background:#1db954;color:white;border:none;padding:8px 10px;border-radius:6px;width:100%;margin-bottom:6px;">
✔ Valider
</button>
` : "✅ Validé<br><br>"}

<button onclick="deleteClient('${c.id}')" 
style="background:red;color:white;border:none;padding:8px 10px;border-radius:6px;width:100%;">
🗑 Supprimer
</button>

</div>
`);

/* =========================
   CLICK BEHAVIOR
========================= */
marker.on("click",()=>{
map.flyTo(c.coords,15,{duration:0.6});
marker.openPopup();
});

clusterGroup.addLayer(marker);
});

document.getElementById("statsBtn").innerText="📊 Clients: "+clients.length;
}

render();

/* =========================
   ACTIONS FIX
========================= */
function completeClient(id){
clients = clients.map(c=>{
if(c.id===id) c.completed=true;
return c;
});
localStorage.setItem("clients",JSON.stringify(clients));
render();
}

function deleteClient(id){
clients = clients.filter(c=>c.id!==id);
localStorage.setItem("clients",JSON.stringify(clients));
render();
}

/* =========================
   POPUP FIX (NE PAS FERMER TROP VITE)
========================= */
map.on("popupopen", function(e){
const btn = e.popup._closeButton;
if(btn){
btn.addEventListener("click", ev=>{
ev.stopPropagation();
});
}
});

</script>

</body>
</html>
