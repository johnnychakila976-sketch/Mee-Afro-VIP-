<div id="app">

<div id="statsBtn">📊 Clients: 0</div>

<!-- 🆕 CLASSEMENT VIP -->
<div id="vipRanking"></div>

<input id="search" placeholder="🔎 Rechercher un client..." oninput="searchClients()" />

<div id="filters">
  <button onclick="setFilter('all')" class="active">Tout</button>
  <button onclick="setFilter('done')">Complétés</button>
  <button onclick="setFilter('todo')">Non</button>
  <button onclick="exportCSV()">📤 Export</button>
</div>

<div class="header">📍 Carte Mayotte Mobile PRO</div>

<button class="toggle-btn" onclick="toggleForm()">📋 Formulaire</button>

<div class="form" id="form">

  <input id="nom" placeholder="Nom"/>
  <input id="prenom" placeholder="Prénom"/>
  <input id="ville" placeholder="Ville"/>
  <input id="numero" placeholder="Numéro"/>
  <input id="adresse" placeholder="Adresse"/>

  <div style="margin:10px 0;">
    <button type="button" onclick="setType('basic')" id="basicBtn">BASIC</button>
    <button type="button" onclick="setType('vip')" id="vipBtn">VIP ⭐</button>
  </div>

  <button onclick="addClient()">Ajouter client</button>
</div>

<div id="map"></div>
</div>

<script>

const map = L.map('map').setView([-12.8275,45.1662],10);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let clients = JSON.parse(localStorage.getItem("clients")) || [];
let markers = {};
let filter="all";
let searchQuery="";
let clientType="basic";

/* TYPE */
function setType(type){
  clientType = type;
}

/* STATS */
function updateStats(){
  const total = clients.length;
  const done = clients.filter(c => c.completed).length;
  const todo = total - done;

  document.getElementById("statsBtn").innerHTML = `
    📊 Total: ${total} | ✅ OK: ${done} | ⏳ En cours: ${todo}
  `;
}

/* 🆕 VIP RANKING */
function updateVIPRanking(){
  const vipClients = clients.filter(c => c.type === "vip");

  const sorted = vipClients.sort((a,b)=>{
    return (a.completed - b.completed);
  });

  let html = "⭐ VIP Ranking:<br>";

  sorted.slice(0,5).forEach((c,i)=>{
    html += `${i+1}. ${c.nom} ${c.prenom} ${c.completed ? "✅" : "⏳"}<br>`;
  });

  document.getElementById("vipRanking").innerHTML = html;
}

function save(){
  localStorage.setItem("clients",JSON.stringify(clients));
  updateStats();
  updateVIPRanking(); // 🆕 AJOUT UNIQUEMENT
}

function toggleForm(){
  const f=document.getElementById("form");
  f.style.display=f.style.display==="flex"?"none":"flex";
}

/* ICON */
function createIcon(type){
  if(type === "vip"){
    return L.divIcon({
      className:"",
      html:`<div class="pulse vip"></div>`,
      iconSize:[20,20]
    });
  }

  return L.divIcon({
    className:"",
    html:`<div class="pulse basic"></div>`,
    iconSize:[20,20]
  });
}

/* FILTER */
function setFilter(f){
  filter=f;
  document.querySelectorAll("#filters button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
  render();
}

/* SEARCH */
function searchClients(){
  searchQuery = document.getElementById("search").value.toLowerCase();
  render();
}

/* RENDER */
function render(){
  Object.values(markers).forEach(m=>map.removeLayer(m));
  markers={};

  clients.forEach(c=>{

    if(filter==="done" && !c.completed) return;
    if(filter==="todo" && c.completed) return;

    const fullName = (c.nom + " " + c.prenom).toLowerCase();
    if(searchQuery && !fullName.includes(searchQuery)) return;

    const m=L.marker(c.coords,{
      icon:createIcon(c.type)
    }).addTo(map);

    m.bindPopup(`
      <b>${c.nom} ${c.prenom}</b><br>
      ⭐ Type: ${c.type.toUpperCase()}<br>
      📍 ${c.ville}<br>
      🏠 ${c.adresse}<br>
      📞 ${c.numero}<br>
      Status: ${c.completed ? "✅ Terminé" : "⏳ En cours"}<br><br>

      ${!c.completed ? `
        <button onclick="completeClient('${c.id}')">✔ Terminer</button>
      ` : ""}
    `);

    markers[c.id]=m;
  });

  updateStats();
  updateVIPRanking(); // 🆕 AJOUT
}

/* COMPLETE */
function completeClient(id){
  clients=clients.map(c=>{
    if(c.id===id) c.completed=true;
    return c;
  });
  save();
  render();
}

/* EXPORT */
function exportCSV(){
  let csv="Nom,Prénom,Ville,Numéro,Adresse,Type,Status\n";
  clients.forEach(c=>{
    csv+=`${c.nom},${c.prenom},${c.ville},${c.numero},${c.adresse},${c.type},${c.completed?"OK":"NON"}\n`;
  });

  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);

  const a=document.createElement("a");
  a.href=url;
  a.download="clients.csv";
  a.click();
}

/* GEO */
async function getCoords(ville){
  const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${ville}, Mayotte`);
  const d=await res.json();
  if(d[0]) return [parseFloat(d[0].lat),parseFloat(d[0].lon)];
  return [-12.8275,45.1662];
}

/* ADD */
async function addClient(){
  const c={
    id:Date.now().toString(),
    nom:nom.value,
    prenom:prenom.value,
    ville:ville.value,
    numero:numero.value,
    adresse:adresse.value,
    completed:false,
    type:clientType,
    coords:await getCoords(ville.value)
  };

  clients.push(c);
  save();
  render();

  map.flyTo(c.coords,13);
  document.querySelectorAll("input").forEach(i=>i.value="");
}

render();

</script>

<style>
.pulse.basic{
  width:14px;
  height:14px;
  border-radius:50%;
  background:#00ff88;
  box-shadow:0 0 10px #00ff88;
}

.pulse.vip{
  width:16px;
  height:16px;
  border-radius:50%;
  background:gold;
  box-shadow:0 0 15px gold, 0 0 30px orange;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow{
  from{transform:scale(1);opacity:0.7;}
  to{transform:scale(1.3);opacity:1;}
}
</style>
