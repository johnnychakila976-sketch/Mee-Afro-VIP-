<!DOCTYPE html><html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carte Mayotte Mobile</title>  <!-- Leaflet -->  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #041f17;
      color: white;
      overflow: hidden;
    }

    #app {
      display: flex;
      height: 100vh;
      flex-direction: column;
    }

    /* HEADER MOBILE */
    .header {
      padding: 10px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      text-align: center;
      font-weight: bold;
    }

    /* FORM MOBILE */
    .form {
      padding: 10px;
      background: rgba(0,0,0,0.3);
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .form input {
      flex: 1;
      min-width: 45%;
      padding: 8px;
      background: #0b2b22;
      border: none;
      color: white;
      border-radius: 6px;
    }

    .form button {
      width: 100%;
      padding: 10px;
      background: #1db954;
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 8px;
    }

    /* MAP */
    #map {
      flex: 1;
    }

    /* PULSE EFFECT */
    .pulse {
      width: 14px;
      height: 14px;
      background: #00ff88;
      border-radius: 50%;
      box-shadow: 0 0 0 rgba(0,255,136,0.7);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(0,255,136,0.7);
      }
      70% {
        transform: scale(1.3);
        box-shadow: 0 0 0 15px rgba(0,255,136,0);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(0,255,136,0);
      }
    }

    .pulse-blue {
      background: #3aa0ff;
      box-shadow: 0 0 0 rgba(58,160,255,0.7);
      animation: pulse 1.5s infinite;
    }
  </style></head>
<body><div id="app">  <div class="header">📍 Carte Mayotte Mobile PRO</div>  <div class="form">
    <input id="nom" placeholder="Nom" />
    <input id="prenom" placeholder="Prénom" />
    <input id="ville" placeholder="Ville (Mamoudzou, Koungou...)" />
    <input id="numero" placeholder="Numéro" />
    <input id="adresse" placeholder="Adresse" />
    <input id="code" placeholder="Code secret" />
    <button onclick="addClient()">Ajouter client</button>
  </div>  <div id="map"></div></div><script>

const map = L.map('map').setView([-12.8275, 45.1662], 10);

// Zoom automatique style "fly"
setTimeout(() => {
  map.flyTo([-12.8275, 45.1662], 11, {
    animate: true,
    duration: 2
  });
}, 1000);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: ''
}).addTo(map);

const cityCoords = {
  Mamoudzou: [-12.7806, 45.2278],
  Koungou: [-12.735, 45.205],
  Dzaoudzi: [-12.783, 45.281],
  Sada: [-12.851, 45.107]
};

let clients = [];

function createPulseIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div class="pulse ${color}"></div>`,
    iconSize: [20,20]
  });
}

function addClient() {
  const nom = document.getElementById('nom').value;
  const prenom = document.getElementById('prenom').value;
  const ville = document.getElementById('ville').value;
  const numero = document.getElementById('numero').value;
  const adresse = document.getElementById('adresse').value;
  const code = document.getElementById('code').value;

  const coords = cityCoords[ville] || [-12.8275, 45.1662];

  const type = Math.random() > 0.5 ? 'pulse' : 'pulse-blue';

  const marker = L.marker(coords, {
    icon: createPulseIcon(type)
  }).addTo(map);

  marker.bindPopup(
    `<b>${nom} ${prenom}</b><br>
     📍 ${ville}<br>
     🏠 ${adresse}<br>
     📞 ${numero}`
  );

  clients.push(marker);

  // Zoom automatique sur nouveau client
  map.flyTo(coords, 13, {
    animate: true,
    duration: 1.5
  });

  document.querySelectorAll('input').forEach(i => i.value = '');
}

</script></body>
  </html>
