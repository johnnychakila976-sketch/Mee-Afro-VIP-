<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte Mayotte Mobile</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Arial;background:#041f17;color:white;overflow:hidden;}
#app{display:flex;height:100vh;flex-direction:column;}
.header{padding:12px;background:rgba(0,0,0,.45);text-align:center;font-weight:bold;border-bottom:1px solid rgba(255,255,255,.08);}
#statsBtn{position:absolute;bottom:64px;left:12px;background:#1db954;padding:8px 12px;border-radius:10px;font-weight:bold;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.25);}
#filters{position:absolute;top:10px;left:10px;right:10px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;z-index:999;}
#filters button{padding:10px 14px;min-height:44px;border:none;border-radius:10px;background:#0b2b22;color:white;cursor:pointer;font-size:15px;}
#filters button.active{background:#1db954;}
#searchInput{width:210px;min-height:44px;padding:10px 12px;border:none;border-radius:10px;background:#0b2b22;color:white;outline:none;}
.toggle-btn{position:absolute;top:72px;right:12px;z-index:999;min-width:125px;min-height:42px;padding:8px 12px;background:#1db954;border:none;color:white;font-weight:bold;border-radius:10px;cursor:pointer;}
.form{position:absolute;top:160px;left:10px;right:10px;padding:10px;background:#06251c;display:none;flex-wrap:wrap;gap:8px;border-radius:12px;z-index:1001;}
.form.show{display:flex;}
.form input{flex:1;min-width:45%;min-height:44px;padding:10px;background:#0b2b22;border:1px solid rgba(255,255,255,.08);color:white;border-radius:10px;}
.form button{width:100%;min-height:46px;padding:11px;background:#1db954;border:none;color:white;font-weight:bold;border-radius:10px;cursor:pointer;}
.vip-box{display:flex;gap:8px;width:100%;}
.vip-box button{flex:1;}
.vip-active{background:#ffd700 !important;color:black !important;}
#map{flex:1;}
.pulse{width:14px;height:14px;border-radius:50%;animation:pulse 1.5s infinite;}
@keyframes pulse{0%{transform:scale(1);}70%{transform:scale(1.25);}100%{transform:scale(1);}}
</style>
</head>

<body>
<div id="app">

<div id="statsBtn">📊 Clients: 0</div>

<div id="filters">
<input id="searchInput" placeholder="🔎 Rechercher..." oninput="debouncedRender()">
<button onclick="setFilter('all',this)" class="active">Tout</button>
<button onclick="setFilter('done',this)">Complétés</button>
<button onclick="setFilter('todo',this)">Non</button>
<button onclick="resetAll()">♻ Reset</button>
<button onclick="exportCSV()">📤 Export</button>
</div>

<div class="header">📍 Carte Mayotte Mobile PRO</div>
<button class="toggle-btn" onclick="toggleForm()">📋 Formulaire</button>

<div class="form" id="form">
<input id="nom" placeholder="Nom">
<input id="prenom" placeholder="Prénom">
<input id="ville" placeholder="Ville">
<input id="numero" placeholder="Numéro">
<input id="quartier" placeholder="Quartier">
<input id="prix" placeholder="Prix">

<div class="vip-box">
<button id="basicBtn" onclick="setType('BASIC')" class="vip-active">BASIC</button>
<button id="vipBtn" onclick="setType('VIP')">VIP ⭐</button>
</div>

<button onclick="addClient()">Ajouter client</button>
</div>

<div id="map"></div>
</div>

<script>
const map = L.map('map').setView([-12.8275,45.1662],10);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let clients = JSON.parse(localStorage.getItem("clients")) || [];
let markers = {};
let filter = "all";
let clientType = "BASIC";

let rendering = false;
let renderTimeout = null;

/* =========================
   DOM SAFE
========================= */
const nomEl = document.getElementById("nom");
const prenomEl = document.getElementById("prenom");
const villeEl = document.getElementById("ville");
const numeroEl = document.getElementById("numero");
const quartierEl = document.getElementById("quartier");
const prixEl = document.getElementById("prix");

/* =========================
   INIT
========================= */
window.addEventListener("load", ()=>render());

/* =========================
   DEBOUNCE
========================= */
function debouncedRender(){
clearTimeout(renderTimeout);
renderTimeout = setTimeout(render,80);
}

/* =========================
   FORM
========================= */
function toggleForm(){
document.getElementById("form").classList.toggle("show");
setTimeout(()=>map.invalidateSize(),200);
}

/* =========================
   TYPE CLIENT (FIXED)
========================= */
function setType(type){
clientType = type;

document.getElementById("basicBtn").classList.remove("vip-active");
document.getElementById("vipBtn").classList.remove("vip-active");

if(type==="BASIC") document.getElementById("basicBtn").classList.add("vip-active");
else document.getElementById("vipBtn").classList.add("vip-active");
}

/* =========================
   ADD CLIENT SAFE
========================= */
function addClient(){

if(!nomEl.value.trim()) return;

const c={
id:Date.now().toString(),
nom:nomEl.value.trim(),
prenom:prenomEl.value.trim(),
ville:villeEl.value.trim(),
numero:numeroEl.value.trim(),
quartier:quartierEl.value.trim(),
prix:prixEl.value.trim(),
type:clientType,
completed:false,
coords:[-12.8275,45.1662]
};

clients.push(c);
localStorage.setItem("clients",JSON.stringify(clients));

render();

nomEl.value="";
prenomEl.value="";
villeEl.value="";
numeroEl.value="";
quartierEl.value="";
prixEl.value="";
}

/* =========================
   RESET
========================= */
function resetAll(){
clients=[];
markers={};
localStorage.removeItem("clients");
render();
}

/* =========================
   EXPORT
========================= */
function exportCSV(){
let csv="Nom,Prénom,Ville,Numéro,Quartier,Prix,Type,Status\n";

clients.forEach(c=>{
csv+=`${c.nom||""},${c.prenom||""},${c.ville||""},${c.numero||""},${c.quartier||""},${c.prix||""},${c.type||""},${c.completed?"OK":"NON"}\n`;
});

const blob=new Blob([csv],{type:"text/csv"});
const url=URL.createObjectURL(blob);

const a=document.createElement("a");
a.href=url;
a.download="clients.csv";
a.click();
URL.revokeObjectURL(url);
}

/* =========================
   FILTER
========================= */
function setFilter(f,btn){
filter=f;
document.querySelectorAll("#filters button").forEach(b=>b.classList.remove("active"));
if(btn) btn.classList.add("active");
render();
}

/* =========================
   ICON
========================= */
function icon(color){
return L.divIcon({
className:"",
html:`<div class="pulse" style="background:${color}"></div>`,
iconSize:[14,14]
});
}

/* =========================
   OFFSET FIX FINAL
========================= */
function offsetCoords(coords,index,total){

if(!coords || !Array.isArray(coords)) return [-12.8275,45.1662];
if(total<=1) return coords;

const zoom = map.getZoom();
const base = 0.0003;
const scale = Math.pow(2,(14-zoom));

const radius = (base*scale*3)+(total*base*scale);
const angle = index/total*(2*Math.PI);

return [
coords[0]+Math.cos(angle)*radius,
coords[1]+Math.sin(angle)*radius
];
}

/* =========================
   CLEAR MARKERS SAFE
========================= */
function clearMarkers(){
for(let id in markers){
try{ map.removeLayer(markers[id]); }catch(e){}
}
markers={};
}

/* =========================
   RENDER FINAL STABLE
========================= */
function render(){

if(rendering) return;
rendering = true;

clearMarkers();

const search=(document.getElementById("searchInput")?.value||"").toLowerCase();

clients.forEach(c=>{

if(!c.coords || !Array.isArray(c.coords)) return;

if(filter==="done" && !c.completed) return;
if(filter==="todo" && c.completed) return;

const txt=(c.nom+" "+c.prenom+" "+c.ville+" "+(c.quartier||"")).toLowerCase();
if(search && !txt.includes(search)) return;

const color=c.completed?"#777":(c.type==="VIP"?"#ffd700":"#00ff88");

const same=clients.filter(x =>
x.coords &&
Math.abs(x.coords[0]-c.coords[0])<0.000001 &&
Math.abs(x.coords[1]-c.coords[1])<0.000001
);

const index=same.findIndex(x=>x.id===c.id);

const newCoords=offsetCoords(c.coords,index,same.length);

const marker=L.marker(newCoords,{
icon:icon(color)
}).addTo(map);

markers[c.id]=marker;

});

document.getElementById("statsBtn").innerText="📊 Clients: "+clients.length;

rendering=false;
}

render();
</script>

</body>
</html>
