<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte Mayotte Mobile PRO</title><link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script><style>
*{box-sizing:border-box;}
html,body{height:100%;margin:0;font-family:Arial;background:#061a14;color:white;overflow:hidden;}

#app{height:100%;display:flex;flex-direction:column;}

/* HEADER STYLE (comme visuel pro) */
.header{
padding:14px;
background:rgba(0,0,0,.55);
text-align:center;
font-weight:bold;
letter-spacing:1px;
border-bottom:1px solid rgba(255,255,255,.08);
}

/* MAP */
#map{flex:1;}

/* TOP BAR */
#filters{
position:absolute;
top:10px;
left:10px;
right:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
z-index:999;
}

#filters input{
padding:10px;
border-radius:10px;
border:none;
background:#0b2a20;
color:white;
min-width:180px;
outline:none;
}

#filters button{
padding:10px 12px;
border:none;
border-radius:10px;
background:#0b2a20;
color:white;
cursor:pointer;
font-weight:bold;
}

#filters button.active{background:#1db954;}

/* STATS */
#statsBtn{
position:absolute;
bottom:70px;
left:12px;
z-index:999;
background:#1db954;
padding:10px 14px;
border-radius:12px;
font-weight:bold;
box-shadow:0 4px 12px rgba(0,0,0,.3);
}

/* BUTTON FORM */
.toggle-btn{
position:absolute;
top:70px;
right:12px;
z-index:999;
background:#1db954;
border:none;
padding:10px 14px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

/* OVERLAY */
#overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
display:none;
z-index:1000;
}
#overlay.show{display:block;}

/* FORM POPUP (style carte pro) */
.form{
position:absolute;
top:140px;
left:50%;
transform:translateX(-50%) translateY(-20px);
width:92%;
max-width:420px;
background:#0b241c;
padding:12px;
border-radius:14px;
display:none;
flex-wrap:wrap;
gap:8px;
z-index:1001;
box-shadow:0 10px 30px rgba(0,0,0,.5);
}
.form.show{
display:flex;
transform:translateX(-50%) translateY(0);
}

.form input{
flex:1;
min-width:45%;
padding:10px;
border-radius:10px;
border:1px solid rgba(255,255,255,.08);
background:#0b2a20;
color:white;
outline:none;
}

.form button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#1db954;
color:white;
font-weight:bold;
cursor:pointer;
}

.vip-box{
display:flex;
gap:8px;
width:100%;
}
.vip-box button{flex:1;}
.vip-active{background:#ffd700 !important;color:black !important;}

/* MAP MARKERS */
.pulse{
width:14px;
height:14px;
border-radius:50%;
animation:pulse 1.5s infinite;
}
@keyframes pulse{
0%{transform:scale(1);}70%{transform:scale(1.25);}100%{transform:scale(1);}
}
.vip-blink{
box-shadow:0 0 12px #ffd700;
}

</style></head><body><div id="app"><div id="filters">
<input id="searchInput" placeholder="🔎 Rechercher..." oninput="render()">
<button onclick="setFilter('all',this)" class="active">Tout</button>
<button onclick="setFilter('done',this)">OK</button>
<button onclick="setFilter('todo',this)">NO</button>
<button onclick="resetAll()">Reset</button>
<button onclick="exportCSV()">Export</button>
</div><div class="header">📍 CARTE MAYOTTE MOBILE PRO</div><button class="toggle-btn" onclick="toggleForm()">📋 Formulaire</button>

<div id="overlay" onclick="closeForm()"></div><div class="form" id="form">
<input id="nom" placeholder="Nom">
<input id="prenom" placeholder="Prénom">
<input id="ville" placeholder="Ville">
<input id="numero" placeholder="Numéro">
<input id="quartier" placeholder="Quartier">
<input id="prix" placeholder="Prix"><div class="vip-box">
<button id="basicBtn" onclick="setType('BASIC')" class="vip-active">BASIC</button>
<button id="vipBtn" onclick="setType('VIP')">VIP ⭐</button>
</div><button onclick="addClient()">Ajouter client</button>

</div><div id="map"></div><div id="statsBtn">📊 Clients: 0</div></div><script>
let map;
let clients = JSON.parse(localStorage.getItem("clients")) || [];
let markers = {};
let filter = "all";
let clientType = "BASIC";

function initMap(){
map = L.map('map').setView([-12.8275,45.1662],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
render();
}

function toggleForm(){
document.getElementById("form").classList.add("show");
document.getElementById("overlay").classList.add("show");
}

function closeForm(){
document.getElementById("form").classList.remove("show");
document.getElementById("overlay").classList.remove("show");
}

function setFilter(f,btn){
filter=f;
document.querySelectorAll("#filters button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
render();
}

function setType(t){clientType=t;}

function addClient(){
const c={
id:Date.now(),
nom:nom.value,
prenom:prenom.value,
ville:ville.value,
numero:numero.value,
quartier:quartier.value,
prix:prix.value,
type:clientType,
coords:[-12.8275 + (Math.random()-0.5)*0.02,45.1662 + (Math.random()-0.5)*0.02]
};
clients.push(c);
localStorage.setItem("clients",JSON.stringify(clients));
closeForm();
render();
}

function render(){
if(!map) return;
Object.values(markers).forEach(m=>map.removeLayer(m));
markers={};

let count=0;
clients.forEach(c=>{
const m=L.marker(c.coords).addTo(map);
m.bindPopup(c.nom+" "+c.prenom);
markers[c.id]=m;
count++;
});

document.getElementById("statsBtn").innerText="📊 Clients: "+count;
}

function resetAll(){clients=[];localStorage.clear();render();}
function exportCSV(){alert("Export OK");}

window.onload=initMap;
</script></body>
</html>
