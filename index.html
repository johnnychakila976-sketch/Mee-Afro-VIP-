<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte Mayotte Mobile</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Arial;background:#041f17;color:white;overflow:hidden;}
#app{display:flex;height:100vh;flex-direction:column;}
.header{padding:12px;background:rgba(0,0,0,.45);text-align:center;font-weight:bold;border-bottom:1px solid rgba(255,255,255,.08);}
#statsBtn{position:absolute;bottom:64px;left:12px;background:#1db954;padding:8px 12px;border-radius:10px;font-weight:bold;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.25);}
#filters{position:absolute;top:10px;left:10px;right:10px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;z-index:999;}
#filters button{padding:10px 14px;min-height:44px;border:none;border-radius:10px;background:#0b2b22;color:white;cursor:pointer;font-size:15px;}
#filters button.active{background:#1db954;}
#searchInput{width:210px;min-height:44px;padding:10px 12px;border:none;border-radius:10px;background:#0b2b22;color:white;outline:none;}
.toggle-btn{position:absolute;top:72px;right:12px;z-index:999;min-width:125px;min-height:42px;padding:8px 12px;background:#1db954;border:none;color:white;font-weight:bold;border-radius:10px;cursor:pointer;}
.form{position:absolute;top:160px;left:10px;right:10px;padding:10px;background:#06251c;display:none;flex-wrap:wrap;gap:8px;border-radius:12px;z-index:1001;box-shadow:0 10px 25px rgba(0,0,0,.35);opacity:0;transform:translateY(-20px);transition:all .25s ease;pointer-events:none;}
.form.show{opacity:1;transform:translateY(0);pointer-events:auto;}
.form input{flex:1;min-width:45%;min-height:44px;padding:10px;margin-bottom:6px;background:#0b2b22;border:1px solid rgba(255,255,255,.08);color:white;border-radius:10px;outline:none;}
.form button{width:100%;min-height:46px;padding:11px;background:#1db954;border:none;color:white;font-weight:bold;border-radius:10px;cursor:pointer;}
.vip-box{display:flex;gap:8px;width:100%;}
.vip-box button{flex:1;}
.vip-active{background:#ffd700 !important;color:black !important;}
#map{flex:1;}
</style>
</head>

<body>
<div id="app">
<div id="statsBtn">📊 Clients: 0</div>

<div id="filters">
<input id="searchInput" placeholder="🔎 Rechercher un client..." oninput="render()">
<button onclick="setFilter('all',this)" class="active">Tout</button>
<button onclick="setFilter('done',this)">Complétés</button>
<button onclick="setFilter('todo',this)">Non</button>
<button onclick="resetAll()">♻ Réinitialiser</button>
<button onclick="exportCSV()">📤 Export</button>
</div>

<div class="header">📍 Carte Mayotte Mobile PRO</div>
<button class="toggle-btn" onclick="toggleForm()">📋 Formulaire</button>

<div class="form" id="form">
<input id="nom" placeholder="Nom">
<input id="prenom" placeholder="Prénom">
<input id="ville" placeholder="Ville">
<input id="numero" placeholder="Numéro">
<input id="quartier" placeholder="Quartier">
<input id="prix" placeholder="Prix">

<div class="vip-box">
<button type="button" id="basicBtn" onclick="setType('BASIC')" class="vip-active">BASIC</button>
<button type="button" id="vipBtn" onclick="setType('VIP')">VIP ⭐</button>
</div>

<button onclick="addClient()">Ajouter client</button>
</div>

<div id="map"></div>
</div>

<script>
const map = L.map('map').setView([-12.8275,45.1662],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let clients = JSON.parse(localStorage.getItem("clients")) || [];
let markers = {};
let filter = "all";

function setFilter(f,btn){
  filter = f;

  document.querySelectorAll("#filters button").forEach(b=>{
    if(!b.onclick) return;
    b.classList.remove("active");
  });

  if(btn) btn.classList.add("active");

  render();
}

function render(){
Object.values(markers).forEach(m=>map.removeLayer(m));
markers={};

const search = document.getElementById("searchInput").value.toLowerCase();

clients.forEach(c=>{

if(filter === "done"){
  if(c.completed !== true) return;
}

if(filter === "todo"){
  if(c.completed === true) return;
}

const txt=(c.nom+" "+c.prenom+" "+c.ville).toLowerCase();
if(search && !txt.includes(search)) return;

const marker = L.marker(c.coords).addTo(map);
markers[c.id]=marker;
});
}

function addClient(){
const c={
id:Date.now().toString(),
nom:nom.value,
prenom:prenom.value,
ville:ville.value,
coords:[-12.8,45.1],
completed:false
};
clients.push(c);
localStorage.setItem("clients",JSON.stringify(clients));
render();
}

render();
</script>
</body>
</html>
